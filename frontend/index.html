<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Army Vehicle Management System - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="login-container">
    <div class="login-box glass">
      <div class="logo"><img src="assets/logo-indian-army.svg" alt="" width="100px" height="100px"></div>
      <h1>AVMS</h1>
      <p class="subtitle">Army Vehicle Management System</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-primary">
          Login
        </button>

        <p class="error-message" id="errorMessage">Invalid username or password</p>
      </form>

      <div
        style="margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border-color); font-size: 0.8rem; color: var(--text-secondary);">
        <p><strong>Use database-backed admin credentials</strong></p>
        <p style="margin-top: 8px;">Login is validated through backend API auth.</p>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    function getSafeNextPath() {
      const params = new URLSearchParams(window.location.search);
      const next = params.get('next');
      if (!next || !next.startsWith('/frontend/')) {
        return 'dashboard.html';
      }
      const target = next.replace(/^\/frontend\//, '');
      if (!target.endsWith('.html') || target.includes('..')) {
        return 'dashboard.html';
      }
      return target;
    }

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMessage = document.getElementById('errorMessage');
      const button = this.querySelector('button[type="submit"]');

      button.disabled = true;
      button.textContent = 'Authenticating...';
      errorMessage.style.display = 'none';

      const result = await AppData.loginWithBackend(username, password);

      button.disabled = false;
      button.textContent = 'Login';

      if (result.success && result.user) {
        AppData.setSession(result.user);
        AppData.initializeData();
        window.location.href = getSafeNextPath();
      } else {
        errorMessage.textContent = result.error || 'Invalid username or password';
        errorMessage.style.display = 'block';
        setTimeout(() => {
          errorMessage.style.display = 'none';
        }, 3000);
      }
    });

    // If already logged in, redirect
    if (AppData.getSession()) {
      window.location.href = getSafeNextPath();
    }
  </script>
</body>

</html>
